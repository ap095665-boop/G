<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Digital Garage Breach</title>

<style>
:root{
  --bg:#060b14;
  --panel:#0b1326;
  --cyan:#00eaff;
  --green:#00ff9c;
  --yellow:#ffd166;
  --red:#ff4d4d;
  --dim:#1c2a44;
}

*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  background:radial-gradient(circle at 50% 30%,#0d1b3a,var(--bg));
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Consolas,monospace;
  color:var(--cyan);
  overflow:hidden;
}

/* main terminal */
.terminal{
  width:380px;
  max-width:92vw;
  height:640px;
  background:linear-gradient(180deg,#0a1224,#070b16);
  border-radius:20px;
  padding:22px;
  box-shadow:
  0 0 30px rgba(0,255,255,.15),
  inset 0 0 60px rgba(0,255,255,.05);
  position:relative;
  overflow:hidden;
}

/* scan line */
.scan{
  position:absolute;
  left:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  animation:scan 4s linear infinite;
  opacity:.5;
}

@keyframes scan{
  0%{top:0}
  100%{top:100%}
}

/* header */
.header{
  text-align:center;
  font-size:18px;
  margin-bottom:18px;
  letter-spacing:2px;
}

/* output area */
.output{
  font-size:15px;
  line-height:1.5;
  min-height:300px;
}

/* blinking cursor */
.cursor{
  display:inline-block;
  width:8px;
  height:16px;
  background:var(--cyan);
  margin-left:4px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,50%,100%{opacity:1}
  25%,75%{opacity:0}
}

/* progress bar */
.progressBox{
  margin-top:14px;
  display:none;
}

.bar{
  height:10px;
  background:#0f1b35;
  border-radius:6px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--green));
  transition:width .3s;
}

.percent{
  font-size:13px;
  margin-top:4px;
  color:var(--green);
}

/* warning style */
.warning{
  color:var(--red);
  text-shadow:0 0 6px var(--red);
}

/* success */
.success{
  color:var(--green);
  text-shadow:0 0 6px var(--green);
}

/* vault reveal */
.vault{
  margin-top:20px;
  display:none;
  text-align:center;
}

.vaultBox{
  width:120px;
  height:120px;
  margin:auto;
  border-radius:14px;
  background:linear-gradient(145deg,#0e1c39,#061022);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  box-shadow:
  0 0 20px rgba(0,255,200,.3),
  inset 0 0 20px rgba(0,255,200,.2);
  animation:pop .6s ease;
}

@keyframes pop{
  0%{transform:scale(.6);opacity:0}
  100%{transform:scale(1);opacity:1}
}

.label{
  margin-top:10px;
  color:var(--green);
  font-weight:bold;
  letter-spacing:2px;
}
</style>
</head>

<body>

<div class="terminal">

<div class="scan"></div>

<div class="header">
CASE FILE #004
</div>

<div class="output" id="out">
<span id="text"></span><span class="cursor"></span>
</div>

<div class="progressBox" id="progressBox">
<div class="bar">
<div class="fill" id="fill"></div>
</div>
<div class="percent" id="percent">0%</div>
</div>

<div class="vault" id="vault">
<div class="vaultBox">🔐</div>
<div class="label">SECURE VAULT</div>
</div>

</div>

<script>
const lines=[
"INITIALIZING TERMINAL...",
"SCANNING NETWORK NODES...",
"TARGET SYSTEM DETECTED",
"DIGITAL GARAGE NODE FOUND",
"WARNING: UNAUTHORIZED ACCESS ATTEMPT"
]

const text=document.getElementById("text")
let lineIndex=0
let charIndex=0

function typeLine(){
 if(lineIndex>=lines.length){
  breachStage()
  return
 }

 let line=lines[lineIndex]

 if(charIndex<line.length){
  text.innerHTML+=line.charAt(charIndex)
  charIndex++
  setTimeout(typeLine,30)
 }
 else{
  text.innerHTML+="<br>"
  charIndex=0
  lineIndex++
  setTimeout(typeLine,400)
 }
}

function breachStage(){

 text.innerHTML+="<span class='warning'>RUNNING BREACH PROTOCOL...</span><br>"

 const box=document.getElementById("progressBox")
 box.style.display="block"

 const fill=document.getElementById("fill")
 const percent=document.getElementById("percent")

 let p=0
 let timer=setInterval(()=>{
  p+=4
  fill.style.width=p+"%"
  percent.innerText=p+"%"

  if(p>=100){
   clearInterval(timer)
   decryptStage()
  }
 },80)
}

function decryptStage(){

 text.innerHTML+="DECRYPTING ARTIFACT DATABASE...<br>"

 setTimeout(()=>{
  text.innerHTML+="<span class='success'>ACCESS GRANTED</span><br>"
 },900)

 setTimeout(()=>{
  document.getElementById("vault").style.display="block"
 },1500)
}

typeLine()
</script>

</body>
</html>
